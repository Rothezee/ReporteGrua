name: Build ESP32 firmware

on:
  push:
    branches: [main, master]
    paths:
      - "GruaMQTT/**"
      - ".github/workflows/build-firmware.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-arduino-cli@v2

      - name: Configurar core ESP32
        run: |
          arduino-cli config init
          arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core install esp32:esp32@3.0.7 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json

      - name: Instalar librerías
        run: |
          arduino-cli lib install "PubSubClient" "ArduinoJson" "LiquidCrystal I2C"

      - name: Compilar (esquema OTA min_spiffs)
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32:PartitionScheme=min_spiffs,FlashFreq=80" \
            --output-dir GruaMQTT/build \
            GruaMQTT

      - name: Renombrar bin y SHA256
        run: |
          BIN=$(find GruaMQTT/build -name "*.bin" -type f | head -1)
          test -n "$BIN"
          cp "$BIN" GruaMQTT/build/firmware-main.bin
          sha256sum GruaMQTT/build/firmware-main.bin | tee GruaMQTT/build/firmware-main.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-main
          path: |
            GruaMQTT/build/firmware-main.bin
            GruaMQTT/build/firmware-main.sha256

      # Opcional: creá el tag `firmware-builds` en GitHub y descomentá para subir al release fijo
      # - uses: softprops/action-gh-release@v2
      #   if: github.ref == 'refs/heads/main'
      #   with:
      #     tag_name: firmware-builds
      #     name: Firmware builds
      #     files: GruaMQTT/build/firmware-main.bin
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
